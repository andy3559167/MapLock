# Language: zh_tw, zh_cn, en
language: "zh_tw"

# Worlds where map locking is disabled
disabled-worlds:
  - "disabledworlds1"
  - "disabledworlds2"

# Economy settings (requires Vault and an economy plugin)
economy:
  enabled: false
  cost: 0.0

# Item cost settings
item-cost:
  enabled: false
  material: "DIAMOND"
  amount: 1
  display-name: "Map Lock Token"

  # Require exact meta when consuming the configured item
  strict-meta-check: true
  required-name: "&bMap Lock Token"
  required-lore:
    - "&7Special item for map locking"
    - "&7Use it to secure your map"
