name: MapLock
version: 1.2
main: com.norule.maplock.MapLockPlugin
author: Andy & Gemini
description: Cross-version filled map locking for Spigot, Paper, and Folia.
softdepend: [Vault]
folia-supported: true

commands:
  map:
    description: MapLock management commands
    usage: /map <help|lock|unlock|admin>

permissions:
  maplock.help:
    description: 允許查看幫助選單
    default: true
  maplock.lock:
    description: 允許鎖定地圖
    default: true
  maplock.unlock:
    description: 允許解鎖自己的地圖
    default: true
  maplock.admin.info:
    description: 允許查詢地圖資訊
    default: op
  maplock.admin.reload:
    description: 允許重載設定檔
    default: op
  maplock.admin.forceunlock:
    description: 允許強制解鎖他人的地圖
    default: op
  maplock.admin.bypass:
    description: 無視禁用世界與手續費限制
    default: op
